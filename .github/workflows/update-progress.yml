name: 更新首頁進度儀表板

on:
  push:
    branches: [main]
  workflow_dispatch:


concurrency:
  group: bot-push
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-readme:
    if: "!startsWith(github.event.head_commit.message, '[Bot]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_TOKEN }}

      - name: 收集統計數據與各 Squad 進度
        id: stats
        run: |
          # 全域統計
          LAW_COUNT=$(find docs/laws -name "*.md" ! -name "INDEX.md" 2>/dev/null | wc -l)
          SKILL_COUNT=$(find skills -name "*.py" 2>/dev/null | wc -l)
          SQUAD_CODE=$(find squads -name "*.py" -o -name "*.json" 2>/dev/null | wc -l)
          TOOL_COUNT=$(find tools -name "*.py" 2>/dev/null | wc -l)
          TOTAL_COMMITS=$(git rev-list --count HEAD)
          CONTRIBUTORS=$(git log --format='%ae' | sort -u | wc -l)

          # 各 Squad 資料夾掃描（README.md 不算，其他檔案才算有貢獻）
          SQUAD_DIRS=(
            "01_設計層_S03_法規智慧組"
            "01_設計層_S04_建築設計組"
            "01_設計層_S05_室內設計組"
            "01_設計層_S06_BIM技術組"
            "02_管理層_S07_案例管理組"
            "02_管理層_S08_永續節能組"
            "02_管理層_S09_行政整合組"
            "03_商業層_S10_行銷公關組"
            "03_商業層_S11_財務管理組"
            "03_商業層_S12_數據採集組"
            "04_核心層_IT_進化組"
          )

          SQUAD_TOTAL=${#SQUAD_DIRS[@]}
          SQUAD_DONE=0
          SQUAD_DATA=""

          for dir in "${SQUAD_DIRS[@]}"; do
            path="docs/squads/$dir"
            count=$(find "$path" -type f ! -name "README.md" 2>/dev/null | wc -l)
            if [ "$count" -gt 0 ]; then
              SQUAD_DONE=$((SQUAD_DONE + 1))
              status="✅"
            else
              status="⬜"
            fi
            SQUAD_DATA="${SQUAD_DATA}${dir}|${status}|${count};"
          done

          echo "squad_done=$SQUAD_DONE"       >> $GITHUB_OUTPUT
          echo "squad_total=$SQUAD_TOTAL"     >> $GITHUB_OUTPUT
          echo "squad_data=$SQUAD_DATA"       >> $GITHUB_OUTPUT
          echo "law_count=$LAW_COUNT"         >> $GITHUB_OUTPUT
          echo "skill_count=$SKILL_COUNT"     >> $GITHUB_OUTPUT
          echo "squad_code=$SQUAD_CODE"       >> $GITHUB_OUTPUT
          echo "tool_count=$TOOL_COUNT"       >> $GITHUB_OUTPUT
          echo "total_commits=$TOTAL_COMMITS" >> $GITHUB_OUTPUT
          echo "contributors=$CONTRIBUTORS"   >> $GITHUB_OUTPUT

      - name: 更新 README 進度區塊
        env:
          SQUAD_DONE:    ${{ steps.stats.outputs.squad_done }}
          SQUAD_TOTAL:   ${{ steps.stats.outputs.squad_total }}
          SQUAD_DATA:    ${{ steps.stats.outputs.squad_data }}
          LAW_COUNT:     ${{ steps.stats.outputs.law_count }}
          SKILL_COUNT:   ${{ steps.stats.outputs.skill_count }}
          SQUAD_CODE:    ${{ steps.stats.outputs.squad_code }}
          TOOL_COUNT:    ${{ steps.stats.outputs.tool_count }}
          TOTAL_COMMITS: ${{ steps.stats.outputs.total_commits }}
          CONTRIBUTORS:  ${{ steps.stats.outputs.contributors }}
        run: |
          python3 << 'PYEOF'
          import os, re
          from datetime import datetime, timezone

          done       = int(os.environ.get("SQUAD_DONE", 0))
          total      = int(os.environ.get("SQUAD_TOTAL", 11))
          squad_data = os.environ.get("SQUAD_DATA", "")
          law        = int(os.environ.get("LAW_COUNT", 0))
          skill      = int(os.environ.get("SKILL_COUNT", 0))
          code       = int(os.environ.get("SQUAD_CODE", 0))
          tool       = int(os.environ.get("TOOL_COUNT", 0))
          commits    = os.environ.get("TOTAL_COMMITS", "0")
          contribs   = os.environ.get("CONTRIBUTORS", "0")
          now        = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")

          pct    = done * 100 // total if total > 0 else 0
          blocks = done * 10 // total if total > 0 else 0
          bar    = "█" * blocks + "░" * (10 - blocks)

          # Squad 層級對照
          LAYER = {
            "01": ("專業設計層", "🏗️"),
            "02": ("專案管理層", "📋"),
            "03": ("商業支援層", "💼"),
            "04": ("系統核心層", "⚙️"),
          }

          # 解析 squad_data
          squad_rows = ""
          prev_layer = ""
          for entry in squad_data.split(";"):
            entry = entry.strip()
            if not entry:
              continue
            parts = entry.split("|")
            if len(parts) < 3:
              continue
            folder, status, count = parts[0], parts[1], parts[2]
            # 從資料夾名稱取 Squad ID 和組名
            segs = folder.split("_")          # ['01','設計層','S03','法規智慧組']
            layer_key = segs[0]
            squad_id  = segs[2] if len(segs) > 2 else ""
            squad_name = "_".join(segs[3:]) if len(segs) > 3 else ""
            layer_name, layer_icon = LAYER.get(layer_key, ("", ""))
            count_i = int(count)

            # 層級分隔標題
            if layer_key != prev_layer:
              squad_rows += f"| **{layer_icon} {layer_name}** | | | |\n"
              prev_layer = layer_key

            # 貢獻狀態
            if count_i == 0:
              contrib = "**🙋 開放貢獻**"
            elif count_i < 3:
              contrib = f"🔧 進行中（{count_i} 份）"
            else:
              contrib = f"✅ 完善中（{count_i} 份）"

            repo_link = f"[`docs/squads/{folder}`](docs/squads/{folder})"
            squad_rows += f"| {squad_id} {squad_name} | {status} | {contrib} | {repo_link} |\n"

          law_s   = f"✅ {law} 份" if law   > 0 else "⬜ 待建立"
          skill_s = f"✅ {skill} 個" if skill > 0 else "⬜ 尚無"
          code_s  = f"✅ {code} 個" if code  > 0 else "⬜ 尚無"
          tool_s  = f"✅ {tool} 個" if tool  > 0 else "⬜ 尚無"

          block = (
            "<!-- PROGRESS_START -->\n"
            "## 📊 系統執行進度\n\n"
            f"> 自動更新：{now} ｜ Commits：{commits} ｜ 貢獻者：{contribs}\n\n"
            f"### Squad 文件覆蓋率　`{bar}` {done}/{total} ({pct}%)\n\n"
            "| Squad | 狀態 | 貢獻進度 | 資料夾 |\n"
            "|-------|------|---------|--------|\n"
            + squad_rows +
            "\n> 🙋 **開放貢獻** = 尚無任何文件，最歡迎你來新增！\n\n"
            "### 系統資源統計\n\n"
            "| 資源 | 數量 | 路徑 |\n|------|------|------|\n"
            f"| 📋 法規文件 | {law_s} | `docs/laws/` |\n"
            f"| 🧠 Skills 模組 | {skill_s} | `skills/` |\n"
            f"| 🤖 Squad 程式碼 | {code_s} | `squads/` |\n"
            f"| 🔧 工具模組 | {tool_s} | `tools/` |\n\n"
            "### GitHub Actions 狀態\n\n"
            "![自動索引更新](https://github.com/Fuyo0426/autoarch-opensource/actions/workflows/auto-index.yml/badge.svg)\n"
            "![進化追蹤](https://github.com/Fuyo0426/autoarch-opensource/actions/workflows/evolution-tracker.yml/badge.svg)\n"
            "![進度儀表板](https://github.com/Fuyo0426/autoarch-opensource/actions/workflows/update-progress.yml/badge.svg)\n\n"
            "<!-- PROGRESS_END -->"
          )

          with open("README.md", "r", encoding="utf-8") as f:
            content = f.read()
          new = re.sub(r"<!-- PROGRESS_START -->.*?<!-- PROGRESS_END -->", block, content, flags=re.DOTALL)
          if "<!-- PROGRESS_START -->" not in content:
            new = content.rstrip() + "\n\n" + block + "\n"
          with open("README.md", "w", encoding="utf-8") as f:
            f.write(new)
          print(f"Done. {done}/{total} ({pct}%)")
          PYEOF

      - name: Commit README 進度更新
        run: |
          git config user.name "Naomi Bot"
          git stash --include-untracked || true
          git config user.email "naomi-bot@autoarch"
          git pull --rebase origin main
          git stash pop || true
          git add README.md
          git diff --staged --quiet && echo "無變更" && exit 0
          git commit -m "[Bot] 更新首頁執行進度儀表板"
          git push
